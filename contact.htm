
<!DOCTYPE html>
<html lang="ru">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мой сайт</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background:#101;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        padding:20px;
    }

    .container{
        width:100%;
        max-width:400px;
        text-align:center;
    }

    .photos{
        display:flex;
        justify-content:center;
        gap:10px;
        margin-bottom:25px;
    }

    .photos img{
        width:48%;
        border-radius:15px;
        object-fit:cover;
    }

    .links{
        display:flex;
        flex-direction:column;
        gap:15px;
    }

    .links a{
        text-decoration:none;
        background:#25D366;
        color:white;
        padding:15px;
        border-radius:12px;
        font-size:18px;
        font-weight:bold;
        transition:0.3s;
    }

    .links a:nth-child(2){
        background:#E1306C;
    }

    .links a:nth-child(3){
        background:#229ED9;
    }

    .links a:hover{
        transform:scale(1.03);
        opacity:0.9;
    }
</style>
</head>
